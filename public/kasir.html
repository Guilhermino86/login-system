<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kasir - POS System</title>
  <link rel="stylesheet" href="kasir-style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon">🛒</div>
    <span class="brand-name">KasirKu</span>
  </div>
  <nav class="sidebar-nav">
    <a href="kasir.html" class="nav-item aktif">
      <span class="nav-icon">🧾</span>
      <span>Kasir</span>
    </a>
    <a href="produk.html" class="nav-item">
      <span class="nav-icon">📦</span>
      <span>Produk</span>
    </a>
    <a href="riwayat.html" class="nav-item">
      <span class="nav-icon">📋</span>
      <span>Riwayat</span>
    </a>
    <a href="laporan.html" class="nav-item">
      <span class="nav-icon">📊</span>
      <span>Laporan</span>
    </a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info">
      <div class="user-avatar" id="avatarSidebar">K</div>
      <div>
        <div class="user-nama" id="namaSidebar">-</div>
        <div class="user-role">Kasir</div>
      </div>
    </div>
    <button class="btn-logout" onclick="keluar()">🚪</button>
  </div>
</aside>

<!-- MAIN CONTENT -->
<main class="main">

  <!-- HEADER -->
  <header class="topbar">
    <div>
      <h1 class="page-title">Transaksi Baru</h1>
      <p class="page-sub" id="tanggalSekarang"></p>
    </div>
    <div class="topbar-right">
      <div class="badge-transaksi">
        <span>No. Transaksi</span>
        <strong id="noTransaksi">#TRX-0001</strong>
      </div>
    </div>
  </header>

  <!-- KASIR LAYOUT -->
  <div class="kasir-layout">

    <!-- KIRI: Daftar Produk -->
    <section class="panel-produk">
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" id="cariProduk" placeholder="Cari produk..." oninput="filterProduk()" />
      </div>
      <div class="produk-grid" id="produkGrid">
        <div class="loading-state">Memuat produk...</div>
      </div>
    </section>

    <!-- KANAN: Keranjang -->
    <section class="panel-keranjang">
      <h2 class="keranjang-title">🛒 Keranjang</h2>

      <div class="keranjang-items" id="keranjangItems">
        <div class="empty-cart">
          <div class="empty-icon">🛒</div>
          <p>Keranjang kosong</p>
          <small>Klik produk untuk menambahkan</small>
        </div>
      </div>

      <div class="keranjang-summary">
        <div class="summary-row">
          <span>Subtotal</span>
          <span id="subtotal">Rp 0</span>
        </div>
        <div class="summary-row diskon-row">
          <span>Diskon</span>
          <div class="diskon-input-wrap">
            <span>Rp</span>
            <input type="number" id="diskon" value="0" min="0" oninput="hitungTotal()" />
          </div>
        </div>
        <div class="summary-row total-row">
          <span>TOTAL</span>
          <span id="total" class="total-angka">Rp 0</span>
        </div>
      </div>

      <div class="bayar-section">
        <label class="bayar-label">Uang Diterima</label>
        <div class="bayar-input-wrap">
          <span class="bayar-prefix">Rp</span>
          <input type="number" id="uangDiterima" placeholder="0" oninput="hitungKembalian()" />
        </div>
        <div class="kembalian-box" id="kembalianBox" style="display:none">
          <span>Kembalian</span>
          <strong id="kembalian">Rp 0</strong>
        </div>
      </div>

      <div class="keranjang-actions">
        <button class="btn-batal" onclick="batalTransaksi()">🗑️ Batal</button>
        <button class="btn-bayar" id="btnBayar" onclick="prosesTransaksi()">
          ✅ Bayar Sekarang
        </button>
      </div>
    </section>

  </div>
</main>

<!-- MODAL STRUK -->
<div class="modal-overlay" id="modalStruk" style="display:none">
  <div class="modal-struk">
    <div class="struk-header">
      <div class="struk-logo">🛒 KasirKu</div>
      <div class="struk-info" id="strukInfo"></div>
    </div>
    <div class="struk-items" id="strukItems"></div>
    <div class="struk-total" id="strukTotal"></div>
    <div class="struk-footer">Terima kasih telah berbelanja! 🙏</div>
    <div class="struk-actions">
      <button class="btn-print" onclick="printStruk()">🖨️ Print Struk</button>
      <button class="btn-tutup" onclick="tutupStruk()">✅ Selesai</button>
    </div>
  </div>
</div>

<script>
  // Auth check
  const token = localStorage.getItem('token');
  const user  = JSON.parse(localStorage.getItem('user') || '{}');
  if (!token) window.location.href = 'index.html';

  // Tampilkan info user
  document.getElementById('namaSidebar').textContent = user.nama || '-';
  document.getElementById('avatarSidebar').textContent = (user.nama || 'K')[0].toUpperCase();

  // Tanggal
  const now = new Date();
  document.getElementById('tanggalSekarang').textContent = now.toLocaleDateString('id-ID', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });

  // State
  let semuaProduk = [];
  let keranjang   = [];
  let noUrut      = 1;

  // Generate no transaksi
  function generateNoTransaksi() {
    const d = new Date();
    const tgl = d.toISOString().slice(0,10).replace(/-/g,'');
    return `#TRX-${tgl}-${String(noUrut).padStart(4,'0')}`;
  }
  document.getElementById('noTransaksi').textContent = generateNoTransaksi();

  // Load produk
  async function loadProduk() {
    try {
      const res = await fetch('/api/produk', { headers: { 'Authorization': 'Bearer ' + token } });
      semuaProduk = await res.json();
      renderProduk(semuaProduk);
    } catch {
      document.getElementById('produkGrid').innerHTML = '<div class="empty-state">Gagal memuat produk</div>';
    }
  }

  function renderProduk(list) {
    const grid = document.getElementById('produkGrid');
    if (!list.length) {
      grid.innerHTML = '<div class="empty-state">Belum ada produk.<br><a href="produk.html">Tambah produk</a></div>';
      return;
    }
    grid.innerHTML = list.map(p => `
      <div class="produk-card ${p.stok === 0 ? 'habis' : ''}" onclick="${p.stok > 0 ? `tambahKeranjang(${p.id})` : ''}">
        <div class="produk-emoji">${p.emoji || '📦'}</div>
        <div class="produk-nama">${p.nama}</div>
        <div class="produk-harga">${formatRupiah(p.harga)}</div>
        <div class="produk-stok ${p.stok <= 5 ? 'stok-rendah' : ''}">
          ${p.stok === 0 ? '❌ Habis' : `Stok: ${p.stok}`}
        </div>
      </div>
    `).join('');
  }

  function filterProduk() {
    const q = document.getElementById('cariProduk').value.toLowerCase();
    const hasil = semuaProduk.filter(p => p.nama.toLowerCase().includes(q));
    renderProduk(hasil);
  }

  // Keranjang
  function tambahKeranjang(id) {
    const produk = semuaProduk.find(p => p.id === id);
    if (!produk || produk.stok === 0) return;

    const ada = keranjang.find(k => k.id === id);
    if (ada) {
      if (ada.qty >= produk.stok) { alert(`Stok ${produk.nama} hanya ${produk.stok}`); return; }
      ada.qty++;
    } else {
      keranjang.push({ ...produk, qty: 1 });
    }
    renderKeranjang();
  }

  function ubahQty(id, delta) {
    const idx = keranjang.findIndex(k => k.id === id);
    if (idx === -1) return;
    keranjang[idx].qty += delta;
    if (keranjang[idx].qty <= 0) keranjang.splice(idx, 1);
    renderKeranjang();
  }

  function hapusItem(id) {
    keranjang = keranjang.filter(k => k.id !== id);
    renderKeranjang();
  }

  function renderKeranjang() {
    const el = document.getElementById('keranjangItems');
    if (!keranjang.length) {
      el.innerHTML = `<div class="empty-cart"><div class="empty-icon">🛒</div><p>Keranjang kosong</p><small>Klik produk untuk menambahkan</small></div>`;
      hitungTotal();
      return;
    }
    el.innerHTML = keranjang.map(k => `
      <div class="keranjang-item">
        <div class="ki-info">
          <span class="ki-emoji">${k.emoji || '📦'}</span>
          <div>
            <div class="ki-nama">${k.nama}</div>
            <div class="ki-harga">${formatRupiah(k.harga)}</div>
          </div>
        </div>
        <div class="ki-qty">
          <button onclick="ubahQty(${k.id}, -1)">−</button>
          <span>${k.qty}</span>
          <button onclick="ubahQty(${k.id}, 1)">+</button>
        </div>
        <div class="ki-subtotal">${formatRupiah(k.harga * k.qty)}</div>
        <button class="ki-hapus" onclick="hapusItem(${k.id})">✕</button>
      </div>
    `).join('');
    hitungTotal();
  }

  function hitungTotal() {
    const subtotal = keranjang.reduce((s, k) => s + k.harga * k.qty, 0);
    const diskon   = parseInt(document.getElementById('diskon').value) || 0;
    const total    = Math.max(0, subtotal - diskon);
    document.getElementById('subtotal').textContent = formatRupiah(subtotal);
    document.getElementById('total').textContent    = formatRupiah(total);
    hitungKembalian();
  }

  function hitungKembalian() {
    const diskon  = parseInt(document.getElementById('diskon').value) || 0;
    const subtotal = keranjang.reduce((s, k) => s + k.harga * k.qty, 0);
    const total   = Math.max(0, subtotal - diskon);
    const bayar   = parseInt(document.getElementById('uangDiterima').value) || 0;
    const box     = document.getElementById('kembalianBox');
    if (bayar > 0) {
      const kembalian = bayar - total;
      document.getElementById('kembalian').textContent = formatRupiah(kembalian);
      box.style.display = 'flex';
      box.style.color = kembalian < 0 ? '#ef4444' : '#16a34a';
    } else {
      box.style.display = 'none';
    }
  }

  function batalTransaksi() {
    if (keranjang.length && !confirm('Batalkan transaksi?')) return;
    keranjang = [];
    document.getElementById('diskon').value = 0;
    document.getElementById('uangDiterima').value = '';
    document.getElementById('kembalianBox').style.display = 'none';
    renderKeranjang();
    noUrut++;
    document.getElementById('noTransaksi').textContent = generateNoTransaksi();
  }

  async function prosesTransaksi() {
    if (!keranjang.length) { alert('Keranjang kosong!'); return; }
    const diskon  = parseInt(document.getElementById('diskon').value) || 0;
    const subtotal = keranjang.reduce((s, k) => s + k.harga * k.qty, 0);
    const total   = Math.max(0, subtotal - diskon);
    const bayar   = parseInt(document.getElementById('uangDiterima').value) || 0;
    if (bayar < total) { alert('Uang diterima kurang!'); return; }

    const btn = document.getElementById('btnBayar');
    btn.disabled = true;
    btn.textContent = 'Memproses...';

    try {
      const res = await fetch('/api/transaksi', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({
          noTransaksi: generateNoTransaksi(),
          items: keranjang.map(k => ({ id: k.id, nama: k.nama, harga: k.harga, qty: k.qty })),
          subtotal, diskon, total, bayar,
          kembalian: bayar - total,
          kasir: user.nama
        })
      });

      if (!res.ok) {
        const err = await res.json();
        alert(err.error || 'Transaksi gagal!');
      } else {
        const hasil = await res.json();
        tampilStruk(hasil.transaksi);
        // Reload produk (stok berubah)
        await loadProduk();
        noUrut++;
        document.getElementById('noTransaksi').textContent = generateNoTransaksi();
      }
    } catch {
      alert('Tidak bisa terhubung ke server!');
    }

    btn.disabled = false;
    btn.textContent = '✅ Bayar Sekarang';
  }

  function tampilStruk(trx) {
    document.getElementById('strukInfo').innerHTML = `
      <div>${trx.noTransaksi}</div>
      <div>${new Date(trx.waktu).toLocaleString('id-ID')}</div>
      <div>Kasir: ${trx.kasir}</div>
    `;
    document.getElementById('strukItems').innerHTML = trx.items.map(i => `
      <div class="struk-item">
        <span>${i.nama} x${i.qty}</span>
        <span>${formatRupiah(i.harga * i.qty)}</span>
      </div>
    `).join('');
    document.getElementById('strukTotal').innerHTML = `
      <div class="struk-row"><span>Subtotal</span><span>${formatRupiah(trx.subtotal)}</span></div>
      ${trx.diskon > 0 ? `<div class="struk-row"><span>Diskon</span><span>-${formatRupiah(trx.diskon)}</span></div>` : ''}
      <div class="struk-row struk-total-row"><span>TOTAL</span><span>${formatRupiah(trx.total)}</span></div>
      <div class="struk-row"><span>Bayar</span><span>${formatRupiah(trx.bayar)}</span></div>
      <div class="struk-row struk-kembalian"><span>Kembalian</span><span>${formatRupiah(trx.kembalian)}</span></div>
    `;
    document.getElementById('modalStruk').style.display = 'flex';
  }

  function tutupStruk() {
    document.getElementById('modalStruk').style.display = 'none';
    keranjang = [];
    document.getElementById('diskon').value = 0;
    document.getElementById('uangDiterima').value = '';
    document.getElementById('kembalianBox').style.display = 'none';
    renderKeranjang();
  }

  function printStruk() { window.print(); }

  function keluar() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = 'index.html';
  }

  function formatRupiah(n) {
    return 'Rp ' + Number(n).toLocaleString('id-ID');
  }

  loadProduk();
</script>

</body>
</html>
