<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daftar - Sistem Akun</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="kartu">

    <!-- Header -->
    <div class="logo">
      <div class="logo-ikon">✨</div>
      <h1>Buat Akun Baru</h1>
      <p>Isi data di bawah untuk mendaftar</p>
    </div>

    <!-- Pesan Error / Sukses -->
    <div class="alert alert-error"  id="pesanError"></div>
    <div class="alert alert-sukses" id="pesanSukses"></div>

    <!-- Form Register -->
    <div class="form-group">
      <label for="nama">Nama Lengkap</label>
      <input type="text" id="nama" placeholder="Masukkan nama kamu" />
    </div>

    <div class="form-group">
      <label for="email">Alamat Email</label>
      <input type="email" id="email" placeholder="contoh@email.com" />
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Minimal 6 karakter" />
    </div>

    <div class="form-group">
      <label for="konfirmasi">Konfirmasi Password</label>
      <input type="password" id="konfirmasi" placeholder="Ulangi password" />
    </div>

    <button class="btn btn-utama" id="btnDaftar" onclick="register()">
      Buat Akun
    </button>

    <div class="link-bawah">
      Sudah punya akun? <a href="index.html">Masuk di sini</a>
    </div>

  </div>

  <script>
    // Fungsi Register
    async function register() {
      const nama      = document.getElementById('nama').value.trim();
      const email     = document.getElementById('email').value.trim();
      const password  = document.getElementById('password').value;
      const konfirmasi = document.getElementById('konfirmasi').value;
      const btn       = document.getElementById('btnDaftar');

      sembunyikanPesan();

      // Validasi di frontend
      if (!nama || !email || !password || !konfirmasi) {
        tampilError('Semua kolom harus diisi!');
        return;
      }

      if (password.length < 6) {
        tampilError('Password minimal 6 karakter!');
        return;
      }

      if (password !== konfirmasi) {
        tampilError('Password dan konfirmasi tidak sama!');
        return;
      }

      // Loading
      btn.disabled = true;
      btn.innerHTML = '<span class="loading">Mendaftarkan</span>';

      try {
        // Kirim data ke backend
        const response = await fetch('/api/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nama, email, password })
        });

        const hasil = await response.json();

        if (!response.ok) {
          tampilError(hasil.error);
        } else {
          tampilSukses('Akun berhasil dibuat! Mengarahkan ke halaman login...');

          // Bersihkan form
          document.getElementById('nama').value = '';
          document.getElementById('email').value = '';
          document.getElementById('password').value = '';
          document.getElementById('konfirmasi').value = '';

          // Pindah ke login setelah 2 detik
          setTimeout(() => {
            window.location.href = 'index.html';
          }, 2000);
        }

      } catch (err) {
        tampilError('Tidak bisa terhubung ke server. Pastikan server berjalan!');
      }

      btn.disabled = false;
      btn.innerHTML = 'Buat Akun';
    }

    // Helper functions
    function tampilError(pesan) {
      const el = document.getElementById('pesanError');
      el.textContent = '❌ ' + pesan;
      el.classList.add('tampil');
    }

    function tampilSukses(pesan) {
      const el = document.getElementById('pesanSukses');
      el.textContent = '✅ ' + pesan;
      el.classList.add('tampil');
    }

    function sembunyikanPesan() {
      document.getElementById('pesanError').classList.remove('tampil');
      document.getElementById('pesanSukses').classList.remove('tampil');
    }

    // Enter untuk daftar
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') register();
    });
  </script>

</body>
</html>
