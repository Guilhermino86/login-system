<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Produk - KasirKu</title>
  <link rel="stylesheet" href="kasir-style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-brand">
    <div class="brand-icon">🛒</div>
    <span class="brand-name">KasirKu</span>
  </div>
  <nav class="sidebar-nav">
    <a href="kasir.html" class="nav-item">
      <span class="nav-icon">🧾</span><span>Kasir</span>
    </a>
    <a href="produk.html" class="nav-item aktif">
      <span class="nav-icon">📦</span><span>Produk</span>
    </a>
    <a href="riwayat.html" class="nav-item">
      <span class="nav-icon">📋</span><span>Riwayat</span>
    </a>
    <a href="laporan.html" class="nav-item">
      <span class="nav-icon">📊</span><span>Laporan</span>
    </a>
  </nav>
  <div class="sidebar-footer">
    <div class="user-info">
      <div class="user-avatar" id="avatarSidebar">K</div>
      <div>
        <div class="user-nama" id="namaSidebar">-</div>
        <div class="user-role">Kasir</div>
      </div>
    </div>
    <button class="btn-logout" onclick="keluar()">🚪</button>
  </div>
</aside>

<main class="main">
  <header class="topbar">
    <div>
      <h1 class="page-title">Manajemen Produk</h1>
      <p class="page-sub">Kelola daftar produk toko</p>
    </div>
    <button class="btn-tambah" onclick="bukaModal()">+ Tambah Produk</button>
  </header>

  <div class="content-card">
    <div class="table-toolbar">
      <input type="text" id="cariProduk" placeholder="🔍 Cari produk..." oninput="filterProduk()" class="input-cari" />
      <span id="jumlahProduk" class="badge-count">0 produk</span>
    </div>
    <div class="table-wrap">
      <table class="tabel">
        <thead>
          <tr>
            <th>Produk</th>
            <th>Kategori</th>
            <th>Harga</th>
            <th>Stok</th>
            <th>Aksi</th>
          </tr>
        </thead>
        <tbody id="tabelProduk">
          <tr><td colspan="5" class="td-loading">Memuat...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<!-- MODAL TAMBAH/EDIT -->
<div class="modal-overlay" id="modalProduk" style="display:none">
  <div class="modal-form">
    <div class="modal-header">
      <h2 id="modalJudul">Tambah Produk</h2>
      <button class="modal-close" onclick="tutupModal()">✕</button>
    </div>
    <input type="hidden" id="editId" />
    <div class="form-group">
      <label>Nama Produk</label>
      <input type="text" id="fNama" placeholder="Contoh: Nasi Goreng" />
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Emoji</label>
        <input type="text" id="fEmoji" placeholder="📦" maxlength="2" />
      </div>
      <div class="form-group">
        <label>Kategori</label>
        <input type="text" id="fKategori" placeholder="Makanan" />
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Harga ($)</label>
        <input type="number" id="fHarga" placeholder="0" min="0" />
      </div>
      <div class="form-group">
        <label>Stok</label>
        <input type="number" id="fStok" placeholder="0" min="0" />
      </div>
    </div>
    <div class="alert alert-error" id="modalError" style="display:none"></div>
    <div class="modal-actions">
      <button class="btn-batal-modal" onclick="tutupModal()">Batal</button>
      <button class="btn-simpan" id="btnSimpan" onclick="simpanProduk()">Simpan</button>
    </div>
  </div>
</div>

<script>
  const token = localStorage.getItem('token');
  const user  = JSON.parse(localStorage.getItem('user') || '{}');
  if (!token) window.location.href = 'index.html';

  document.getElementById('namaSidebar').textContent = user.nama || '-';
  document.getElementById('avatarSidebar').textContent = (user.nama || 'K')[0].toUpperCase();

  let semuaProduk = [];

  async function loadProduk() {
    const res = await fetch('/api/produk', { headers: { 'Authorization': 'Bearer ' + token } });
    semuaProduk = await res.json();
    renderTabel(semuaProduk);
  }

  function renderTabel(list) {
    document.getElementById('jumlahProduk').textContent = `${list.length} produk`;
    const tbody = document.getElementById('tabelProduk');
    if (!list.length) {
      tbody.innerHTML = '<tr><td colspan="5" class="td-empty">Belum ada produk</td></tr>';
      return;
    }
    tbody.innerHTML = list.map(p => `
      <tr>
        <td><span class="td-emoji">${p.emoji||'📦'}</span> ${p.nama}</td>
        <td><span class="badge-kategori">${p.kategori||'-'}</span></td>
        <td class="td-mono">${formatUSD(p.harga)}</td>
        <td><span class="badge-stok ${p.stok===0?'stok-habis':p.stok<=5?'stok-rendah':'stok-aman'}">${p.stok}</span></td>
        <td class="td-aksi">
          <button class="btn-edit" onclick="editProduk(${p.id})">✏️ Edit</button>
          <button class="btn-hapus" onclick="hapusProduk(${p.id})">🗑️</button>
        </td>
      </tr>
    `).join('');
  }

  function filterProduk() {
    const q = document.getElementById('cariProduk').value.toLowerCase();
    renderTabel(semuaProduk.filter(p => p.nama.toLowerCase().includes(q) || (p.kategori||'').toLowerCase().includes(q)));
  }

  function bukaModal(reset=true) {
    if (reset) {
      document.getElementById('modalJudul').textContent = 'Tambah Produk';
      document.getElementById('editId').value = '';
      document.getElementById('fNama').value = '';
      document.getElementById('fEmoji').value = '';
      document.getElementById('fKategori').value = '';
      document.getElementById('fHarga').value = '';
      document.getElementById('fStok').value = '';
      document.getElementById('modalError').style.display = 'none';
    }
    document.getElementById('modalProduk').style.display = 'flex';
  }

  function tutupModal() {
    document.getElementById('modalProduk').style.display = 'none';
  }

  function editProduk(id) {
    const p = semuaProduk.find(x => x.id === id);
    if (!p) return;
    document.getElementById('modalJudul').textContent = 'Edit Produk';
    document.getElementById('editId').value = id;
    document.getElementById('fNama').value = p.nama;
    document.getElementById('fEmoji').value = p.emoji || '';
    document.getElementById('fKategori').value = p.kategori || '';
    document.getElementById('fHarga').value = p.harga;
    document.getElementById('fStok').value = p.stok;
    document.getElementById('modalError').style.display = 'none';
    bukaModal(false);
  }

  async function simpanProduk() {
    const id       = document.getElementById('editId').value;
    const nama     = document.getElementById('fNama').value.trim();
    const emoji    = document.getElementById('fEmoji').value.trim() || '📦';
    const kategori = document.getElementById('fKategori').value.trim();
    const harga    = parseInt(document.getElementById('fHarga').value);
    const stok     = parseInt(document.getElementById('fStok').value);
    const errEl    = document.getElementById('modalError');

    if (!nama || isNaN(harga) || isNaN(stok)) {
      errEl.textContent = '❌ Nama, harga, dan stok wajib diisi!';
      errEl.style.display = 'block';
      return;
    }

    const btn = document.getElementById('btnSimpan');
    btn.disabled = true;
    btn.textContent = 'Menyimpan...';

    const url    = id ? `/api/produk/${id}` : '/api/produk';
    const method = id ? 'PUT' : 'POST';

    try {
      const res = await fetch(url, {
        method,
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        body: JSON.stringify({ nama, emoji, kategori, harga, stok })
      });
      if (!res.ok) {
        const err = await res.json();
        errEl.textContent = '❌ ' + err.error;
        errEl.style.display = 'block';
      } else {
        tutupModal();
        await loadProduk();
      }
    } catch {
      errEl.textContent = '❌ Tidak bisa terhubung ke server!';
      errEl.style.display = 'block';
    }

    btn.disabled = false;
    btn.textContent = 'Simpan';
  }

  async function hapusProduk(id) {
    const p = semuaProduk.find(x => x.id === id);
    if (!confirm(`Hapus produk "${p.nama}"?`)) return;
    await fetch(`/api/produk/${id}`, {
      method: 'DELETE',
      headers: { 'Authorization': 'Bearer ' + token }
    });
    await loadProduk();
  }

  function keluar() {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = 'index.html';
  }

  function formatUSD(n) {
    return '$ ' + Number(n||0).toLocaleString('en-US');
  }

  loadProduk();
</script>
</body>
</html>
